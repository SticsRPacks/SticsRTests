# For help debugging build failures open an issue on the RStudio community with the 'github-actions' tag.
# https://community.rstudio.com/new-topic?category=Package%20development&tags=github-actions
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

name: R-CMD-check

env:
  has_testthat: "true"

jobs:
  # specific install for macOS stics executable dependency
  build:
    runs-on: macOS-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          #- {os: windows-latest, r: 'release'}
          - {
              os: ubuntu-latest,
              r: "release",
              rspm: "https://packagemanager.rstudio.com/cran/__linux__/focal/latest",
            }

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: install libxslt
        if: runner.os  != 'Windows'
        run: |
          sudo apt-get update && sudo apt-get install libxslt1-dev
      - name: Install libcurl version OpenSSL
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: libs, ssl, ldap, icu
        if: runner.os  != 'Windows'
        run: |
          wget http://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          wget http://http.us.debian.org/debian/pool/main/o/openldap/libldap-2.4-2_2.4.57+dfsg-3+deb11u1_amd64.deb 
          sudo apt install ./libldap-2.4-2_2.4.57+dfsg-3+deb11u1_amd64.deb
          wget http://archive.ubuntu.com/ubuntu/pool/main/i/icu/libicu66_66.1-2ubuntu2_amd64.deb
          sudo dpkg -i libicu66_66.1-2ubuntu2_amd64.deb
      - uses: actions/checkout@v4
      - name: Checkout SticsRPacks metadata
        uses: actions/checkout@v4
        with:
          repository: SticsRPacks/SticsRPacks
          ref: main
          path: .github/sticsrpacks-main
          sparse-checkout: |
            DESCRIPTION
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu" # openjdk
          java-version: "17"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Build dependency list
        id: dependency-list
        run: |
          parse_imports <- function(path) {
            desc <- read.dcf(path)
            if (!"Imports" %in% colnames(desc)) {
              return(character())
            }
            imports <- trimws(unlist(strsplit(gsub("[\r\n]", " ", desc[1, "Imports"]), ",")))
            imports[nzchar(imports)]
          }

          base_pkgs <- rownames(installed.packages(priority = c("base", "recommended")))
          stics_pkgs <- c("SticsRPacks", "SticsRFiles", "SticsOnR", "CroptimizR", "CroPlotR")

          cran_pkgs <- unique(c(
            parse_imports("DESCRIPTION"),
            parse_imports(".github/sticsrpacks-main/DESCRIPTION"),
            "rcmdcheck",
            "sessioninfo"
          ))
          cran_pkgs <- setdiff(cran_pkgs, c(base_pkgs, stics_pkgs))

          lines <- c(
            sprintf("any::%s", sort(cran_pkgs)),
            "SticsRPacks/SticsRFiles@main",
            "SticsRPacks/CroPlotR@main",
            "SticsRPacks/CroptimizR@main",
            "SticsRPacks/SticsOnR@main"
          )

          cat("Resolved dependency list:\n", paste(lines, collapse = "\n"), "\n", sep = "")

          writeLines(
            c("extra_packages<<EOF", lines, "EOF"),
            Sys.getenv("GITHUB_OUTPUT")
          )
        shell: Rscript {0}

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::sessioninfo
          dependencies: '"all"'
          pak-version: rc
          extra-packages: ${{ steps.dependency-list.outputs.extra_packages }}

      - name: Install SticsRPacks
        run: |
          remotes::install_github(
            "SticsRPacks/SticsRPacks@main",
            dependencies = FALSE,
            upgrade = "never"
          )
        shell: Rscript {0}

      - name: Check
        env:
          _R_CHECK_CRAN_INCOMING_REMOTE_: false
        run: rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "error", check_dir = "check")
        shell: Rscript {0}

      - name: Reveal testthat details
        if: env.has_testthat == 'true'
        run: find . -name testthat.Rout -exec cat '{}' ';'

      - name: Remove unwanted directories from check artifacts
        run: |
          Remove-Item -Recurse -Force check/*/SticsRTests
          Remove-Item -Recurse -Force check/*/00_pkg_src

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: ${{ runner.os }}-r${{ matrix.config.r }}-results
          path: check
