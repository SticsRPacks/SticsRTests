# For help debugging build failures open an issue on the RStudio community with the 'github-actions' tag.
# https://community.rstudio.com/new-topic?category=Package%20development&tags=github-actions
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

name: R-CMD-check

env:
  has_testthat: "true"

jobs:
  # specific install for macOS stics executable dependency
  build:
    runs-on: macOS-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          #- {os: windows-latest, r: 'release'}
          - {
              os: ubuntu-latest,
              r: "release",
              rspm: "https://packagemanager.rstudio.com/cran/__linux__/focal/latest",
            }

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: install libxslt
        if: runner.os  != 'Windows'
        run: |
          sudo apt-get update && sudo apt-get install libxslt1-dev
      - name: Install libcurl version OpenSSL
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: libs, ssl, ldap, icu
        if: runner.os  != 'Windows'
        run: |
          wget http://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          wget http://http.us.debian.org/debian/pool/main/o/openldap/libldap-2.4-2_2.4.57+dfsg-3+deb11u1_amd64.deb 
          sudo apt install ./libldap-2.4-2_2.4.57+dfsg-3+deb11u1_amd64.deb
          wget http://archive.ubuntu.com/ubuntu/pool/main/i/icu/libicu66_66.1-2ubuntu2_amd64.deb
          sudo dpkg -i libicu66_66.1-2ubuntu2_amd64.deb
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu" # openjdk
          java-version: "17"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::sessioninfo
          dependencies: '"all"'
          pak-version: rc
          extra-packages: |
            any::BayesianTools
            any::cli
            any::crayon
            any::curl
            any::data.table
            any::doParallel
            any::dplyr
            any::foreach
            any::ggh4x
            any::ggplot2
            any::ggrepel
            any::gridExtra
            any::knitr
            any::learnr
            any::lhs
            any::lifecycle
            any::lubridate
            any::magrittr
            any::Matrix
            any::nloptr
            any::plyr
            any::purrr
            any::rcmdcheck
            any::readxl
            any::remotes
            any::reshape2
            any::rlang
            any::rstudioapi
            any::semver
            any::sessioninfo
            any::testthat
            any::tibble
            any::tictoc
            any::tidyr
            any::tidyselect
            any::xfun
            any::XML
            any::xml2
            any::xslt
            SticsRPacks/SticsRFiles@main
            SticsRPacks/CroPlotR@main
            SticsRPacks/SticsOnR@main

      - name: Install CroptimizR and SticsRPacks
        run: |
          remotes::install_github(
            "SticsRPacks/CroptimizR@main",
            dependencies = FALSE,
            upgrade = "never"
          )
          remotes::install_github(
            "SticsRPacks/SticsRPacks@main",
            dependencies = FALSE,
            upgrade = "never"
          )
        shell: Rscript {0}

      - name: Check
        env:
          _R_CHECK_CRAN_INCOMING_REMOTE_: false
        run: rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "error", check_dir = "check")
        shell: Rscript {0}

      - name: Reveal testthat details
        if: env.has_testthat == 'true'
        run: find . -name testthat.Rout -exec cat '{}' ';'

      - name: Remove unwanted directories from check artifacts
        run: |
          Remove-Item -Recurse -Force check/*/SticsRTests
          Remove-Item -Recurse -Force check/*/00_pkg_src

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: ${{ runner.os }}-r${{ matrix.config.r }}-results
          path: check
